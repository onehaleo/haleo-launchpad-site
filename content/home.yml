process_title: "How it works"
process_steps:
  - title: "Show us the chaos"
    description: "You complete a structured intake showing your current workflow, spreadsheets, tools, and bottlenecks."
  - title: "We map the system"
    description: "Haleo translates your workflow into a clean internal system structure and sends a walkthrough before build."
  - title: "We build in 10 days"
    description: "Your system is configured, tested, and delivered with a personalized Loom walkthrough."
  - title: "Your team starts using it"
    description: "You get a clean operating system your team can actually adopt."
