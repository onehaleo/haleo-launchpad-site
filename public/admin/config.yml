backend:
  name: github
  repo: onehaleo/haleo-launchpad-site
  branch: main
  open_authoring: true
  base_url: https://cms-oauth-github.vercel.app
  auth_endpoint: api/auth

publish_mode: editorial_workflow

media_folder: "public/images"
public_folder: "/images"

site_url: https://onehaleo.com
display_url: https://onehaleo.com
logo_url: /lovable-uploads/haleo-logo-new.png

collections:
  - name: "homepage"
    label: "Homepage (marketing)"
    files:
      - name: "home"
        label: "Homepage content"
        file: "content/home.yml"
        fields:
          - { label: "Hero Headline", name: "hero_headline", widget: "string" }
          - { label: "Hero Subheadline", name: "hero_subheadline", widget: "text" }
          - { label: "Primary CTA Text", name: "primary_cta_text", widget: "string" }
          - { label: "Primary CTA Link", name: "primary_cta_link", widget: "string" }
          - { label: "Secondary CTA Text", name: "secondary_cta_text", widget: "string", required: false }
          - { label: "Secondary CTA Link", name: "secondary_cta_link", widget: "string", required: false }
          - { label: "Hero trust line", name: "hero_trust_line", widget: "string" }
          - { label: "Services section title", name: "services_section_title", widget: "string" }
          - { label: "Services section intro", name: "services_section_intro", widget: "text" }
          - { label: "Built-from heading", name: "built_from_heading", widget: "string" }
          - { label: "Built-from body", name: "built_from_body", widget: "text" }
          - label: "Built-from bullets"
            name: "built_from_bullets"
            widget: "list"
            field: { label: "Bullet", name: "item", widget: "string" }
          - { label: "Scope section title", name: "scope_section_title", widget: "string" }
          - label: "Scope bullets"
            name: "scope_bullets"
            widget: "list"
            field: { label: "Bullet", name: "item", widget: "string" }
          - { label: "Who it is for — section title", name: "who_for_section_title", widget: "string" }
          - { label: "Who it is for — good column heading", name: "who_for_good_heading", widget: "string" }
          - { label: "Who it is for — not a fit column heading", name: "who_for_not_heading", widget: "string" }
          - label: "Who it is for — good fit bullets"
            name: "who_for_good"
            widget: "list"
            field: { label: "Point", name: "item", widget: "string" }
          - label: "Who it is for — not a fit bullets"
            name: "who_for_not"
            widget: "list"
            field: { label: "Point", name: "item", widget: "string" }
          - { label: "Problem Section Title", name: "problem_section_title", widget: "string" }
          - label: "Problem Points"
            name: "problem_points"
            widget: "list"
            field: { label: "Problem Point", name: "item", widget: "string" }
          - { label: "Before/After Title", name: "before_after_title", widget: "string" }
          - label: "Before Points"
            name: "before_points"
            widget: "list"
            field: { label: "Before Point", name: "item", widget: "string" }
          - label: "After Points"
            name: "after_points"
            widget: "list"
            field: { label: "After Point", name: "item", widget: "string" }
          - { label: "Process Title", name: "process_title", widget: "string" }
          - label: "Process Steps"
            name: "process_steps"
            widget: "list"
            fields:
              - { label: "Step Title", name: "title", widget: "string" }
              - { label: "Step Description", name: "description", widget: "text" }
          - { label: "Final CTA Headline", name: "final_cta_headline", widget: "string" }
          - { label: "Final CTA Subheadline", name: "final_cta_subheadline", widget: "text" }
          - { label: "Final CTA Text", name: "final_cta_text", widget: "string" }
          - { label: "Final CTA Link", name: "final_cta_link", widget: "string" }

  - name: "settings"
    label: "Navigation & footer"
    files:
      - name: "global_settings"
        label: "Site settings"
        file: "content/settings.yml"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Logo Text", name: "logo_text", widget: "string" }
          - { label: "Logo Path", name: "logo_path", widget: "string" }
          - { label: "Contact Email", name: "contact_email", widget: "string" }
          - { label: "Footer Description", name: "footer_description", widget: "text" }
          - label: "Navigation Links"
            name: "nav_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Navigation CTA"
            name: "nav_cta"
            widget: "object"
            fields:
              - { label: "Text", name: "text", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Footer CTA"
            name: "footer_cta"
            widget: "object"
            fields:
              - { label: "Text", name: "text", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Social Links"
            name: "social_links"
            widget: "list"
            fields:
              - { label: "Platform", name: "platform", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Newsletter"
            name: "newsletter"
            widget: "object"
            required: false
            fields:
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Placeholder", name: "placeholder", widget: "string" }
              - { label: "Button Text", name: "cta", widget: "string" }
          - { label: "Footer Copyright", name: "copyright", widget: "string" }
          - { label: "Footer License Text", name: "license_text", widget: "string" }
          - label: "Footer Links"
            name: "footer_links"
            widget: "object"
            fields:
              - label: "Company Column"
                name: "company"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "URL", name: "url", widget: "string" }
              - label: "Legal Column"
                name: "legal"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "URL", name: "url", widget: "string" }

  - name: "services"
    label: "Service cards (homepage grid)"
    label_singular: "Service"
    folder: "content/services"
    create: true
    extension: "yml"
    format: "yaml"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Use URL-safe text like lead-sales-pipeline" }
      - { label: "Short Description", name: "short_description", widget: "text" }
      - { label: "Replaces", name: "replaces", widget: "text" }
      - { label: "Helps With", name: "helps_with", widget: "text" }
      - { label: "Best For", name: "best_for", widget: "text" }
      - label: "Features"
        name: "features"
        widget: "list"
        field: { label: "Feature", name: "item", widget: "string" }

  - name: "demos"
    label: "Demo pages (/demos only)"
    label_singular: "Demo page"
    folder: "content/demos"
    create: true
    extension: "yml"
    format: "yaml"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL path under /demos/ (not linked from homepage)" }
      - { label: "Agency Type", name: "agency_type", widget: "string" }
      - { label: "Short Description", name: "short_description", widget: "text" }
      - { label: "Problem Summary", name: "problem_summary", widget: "text" }
      - label: "Modules"
        name: "modules"
        widget: "list"
        field: { label: "Module", name: "item", widget: "string" }
      - { label: "Before State", name: "before_state", widget: "text" }
      - { label: "After State", name: "after_state", widget: "text" }
      - { label: "CTA Text", name: "cta_text", widget: "string" }
      - { label: "CTA Link", name: "cta_link", widget: "string" }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }