backend:
  name: github
  repo: onehaleo/haleo-launchpad-site
  branch: main
  open_authoring: true
  base_url: https://cms-oauth-github.vercel.app
  auth_endpoint: api/auth

publish_mode: editorial_workflow

media_folder: "public/images"
public_folder: "/images"

site_url: https://onehaleo.com
display_url: https://onehaleo.com
logo_url: /lovable-uploads/haleo-logo-new.png

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - name: "site_yaml"
        label: "Site YAML"
        file: "public/content/site.yaml"
        fields:
          - label: "Content (YAML)"
            name: "raw"
            widget: "code"
            default_language: yaml
            output_code_only: true
            allow_language_selection: false